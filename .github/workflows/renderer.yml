name: Ofoq Studio — Server Renderer

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Firestore Job ID (من أفق ستوديو)'
        required: true
        type: string

  schedule:
    - cron: '*/5 * * * *'
    - cron: '0 */2 * * *'

concurrency:
  group: renderer
  cancel-in-progress: false

jobs:
  render:
    name: Render Video Job
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install npm dependencies
        run: npm install

      - name: 🌐 Install Puppeteer Chrome
        run: npx puppeteer browsers install chrome

      - name: 🎬 Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg
          ffmpeg -version | head -1

      - name: 🔤 Install Arabic fonts
        run: |
          sudo apt-get install -y --no-install-recommends \
            fonts-noto fonts-freefont-ttf \
            fonts-dejavu-core fonts-liberation
          fc-cache -fv

      - name: 🎥 Run Ofoq Renderer
        env:
          JOB_ID:                     ${{ github.event.inputs.job_id }}
          GH_PAT:                     ${{ secrets.GH_PAT }}
          FIREBASE_SERVICE_ACCOUNT:   ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GITHUB_OWNER:               mohamedreyad11111
          GITHUB_REPO_NAME:           render
        run: node renderer.js

      - name: 🧹 Cleanup temp files
        if: always()
        run: |
          rm -rf /tmp/frames_* /tmp/output_* 2>/dev/null || true
          echo "✓ Cleanup done"
