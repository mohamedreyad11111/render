name: Ofoq Video Renderer

on:
  workflow_dispatch:
    inputs:
      js_code:
        description: 'JS Code to execute'
        required: true

jobs:
  build-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install Dependencies
        run: |
          npm install playwright ffmpeg-static
          npx playwright install chromium

      - name: Render Video
        env:
          USER_CODE: ${{ github.event.inputs.js_code }}
        run: node render_script.js

      - name: Upload Video
        uses: actions/upload-artifact@v3
        with:
          name: Rendered_Video
          path: output.mp4
