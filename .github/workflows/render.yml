name: Ofoq Video Renderer (WebCodecs Local)

on:
  workflow_dispatch:
    inputs:
      js_code:
        description: 'JS Code to execute'
        required: true

jobs:
  build-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: |
          npm install playwright
          npx playwright install chromium
          sudo apt-get install -y xvfb
          # تحميل المكتبة من unpkg لأن الرابط التاني كان بايظ
          wget https://unpkg.com/mp4-muxer@4.0.1/dist/mp4-muxer.min.js -O mp4-muxer.js

      - name: Render Video
        env:
          USER_CODE: ${{ github.event.inputs.js_code }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node render_script.js

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: Rendered_Video_${{ github.run_id }}
          path: output.mp4
          retention-days: 1
