name: Ofoq Video Renderer (WebCodecs)

on:
  workflow_dispatch:
    inputs:
      js_code:
        description: 'JS Code to execute'
        required: true

jobs:
  build-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Playwright & Chromium
        run: |
          npm install playwright # لا نحتاج ffmpeg-static هنا
          npx playwright install chromium

      - name: Render Video via WebCodecs
        env:
          USER_CODE: ${{ github.event.inputs.js_code }}
        run: node render_script.js

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: Rendered_Video_${{ github.run_id }}
          path: output.mp4
          retention-days: 1
