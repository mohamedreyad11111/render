<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ofoq Studio — Server Renderer Page</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; }
</style>

<!-- Three.js r157 — نفس الإصدار المستخدم في أفق ستوديو -->
<script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
<!-- GSAP 3 — للمشاهد التي تستخدم Timeline animations -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
</head>
<body>
<canvas id="c"></canvas>

<script>
/* ════════════════════════════════════════════════════════════════════════════
 * Ofoq Studio — Headless Scene Renderer
 *
 * هذه الصفحة تُحمَّل بواسطة Puppeteer في GitHub Actions.
 * البيانات تُحقن قبل تحميل الصفحة عبر:
 *   page.evaluateOnNewDocument(() => { window.__SCENE_DATA__ = { ... }; })
 *
 * بعد التهيئة، يعرض:
 *   window.__READY__  = 'ok' | 'error'
 *   window.__ERROR__  = رسالة الخطأ (إذا فشل)
 *   window.renderFrame(frameIndex) → PNG dataURL
 * ════════════════════════════════════════════════════════════════════════════ */

// ── easing helpers — نفس ما يُحقن في كود المشهد في أفق ستوديو ───────────────
const EASING_SRC = `
  function easeInOut(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
  function easeIn(t){return t*t*t;}
  function easeOut(t){return 1-(1-t)*(1-t)*(1-t);}
  function easeInQuad(t){return t*t;}
  function easeOutQuad(t){return 1-(1-t)*(1-t);}
  function easeInOutQuad(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
  function easeInCubic(t){return t*t*t;}
  function easeOutCubic(t){return 1-Math.pow(1-t,3);}
  function easeInOutCubic(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
  function easeOutElastic(t){const c4=2*Math.PI/3;return t===0?0:t===1?1:Math.pow(2,-10*t)*Math.sin((t*10-0.75)*c4)+1;}
  function easeOutBounce(t){const n1=7.5625,d1=2.75;if(t<1/d1){return n1*t*t;}else if(t<2/d1){return n1*(t-=1.5/d1)*t+0.75;}else if(t<2.5/d1){return n1*(t-=2.25/d1)*t+0.9375;}else{return n1*(t-=2.625/d1)*t+0.984375;}}
  function lerp(a,b,t){return a+(b-a)*t;}
  function clamp(v,mn,mx){return Math.min(Math.max(v,mn),mx);}
  function map(v,a,b,c,d){return c+(d-c)*(v-a)/(b-a);}
`;

async function initScene() {
  const D = window.__SCENE_DATA__;
  if (!D) {
    window.__ERROR__ = 'لا توجد بيانات مشهد (window.__SCENE_DATA__ فارغ)';
    window.__READY__ = 'error';
    return;
  }

  const { code, cfg, fonts, images, bg } = D;

  // ── إعداد الـ Canvas ──────────────────────────────────────────────────────
  const canvas  = document.getElementById('c');
  canvas.width  = cfg.w  || 1920;
  canvas.height = cfg.h  || 1080;
  document.body.style.background = bg || '#000';

  const ctx = canvas.getContext('2d', { alpha: false });

  // ── تحميل الخطوط ──────────────────────────────────────────────────────────
  const fontList = Array.isArray(fonts) ? fonts : [];
  for (const fontEntry of fontList) {
    try {
      // fontEntry قد يكون URL أو { name, url }
      const fontUrl  = typeof fontEntry === 'string' ? fontEntry : fontEntry.url;
      const fontName = typeof fontEntry === 'string'
        ? fontEntry.split('/').pop().replace(/\.[^.]+$/, '').replace(/[-_+]/g, ' ')
        : (fontEntry.name || 'CustomFont');
      const face = new FontFace(fontName, `url(${fontUrl})`);
      await face.load();
      document.fonts.add(face);
      console.log(`✓ Font loaded: ${fontName}`);
    } catch(e) {
      console.warn(`⚠ Font load failed:`, e.message);
    }
  }

  // ── تحميل الصور ───────────────────────────────────────────────────────────
  const preloadedImages = {};
  const imageMap = images || {};
  for (const [key, url] of Object.entries(imageMap)) {
    await new Promise(resolve => {
      const img     = new Image();
      img.crossOrigin = 'anonymous';
      img.onload  = () => { preloadedImages[key] = img; resolve(); };
      img.onerror = (e) => { console.warn(`⚠ Image load failed [${key}]:`, url); resolve(); };
      img.src = url;
    });
  }

  // ── Three.js إعداد ────────────────────────────────────────────────────────
  let scene3D, camera3D, renderer3D;
  try {
    renderer3D = new THREE.WebGLRenderer({
      alpha: true, antialias: true, preserveDrawingBuffer: true
    });
    renderer3D.setSize(cfg.w, cfg.h);
    renderer3D.setClearColor(0x000000, 0);
    scene3D  = new THREE.Scene();
    camera3D = new THREE.PerspectiveCamera(45, cfg.w / cfg.h, 0.1, 1000);
  } catch(e) {
    console.warn('⚠ Three.js init failed (no GPU):', e.message);
    scene3D = camera3D = renderer3D = null;
  }

  // ── الثوابت ───────────────────────────────────────────────────────────────
  const totalF = Math.round((cfg.dur || 10) * (cfg.fps || 60));

  // ── GSAP ─────────────────────────────────────────────────────────────────
  const gsapInst = window.gsap || null;
  const registeredTLs = [];
  const _ofoqRegisterTL = (tl) => { registeredTLs.push(tl); return tl; };

  // ── تجميع كود المشهد ────────────────────────────────────────────────────
  const src = `"use strict";
    const W=${cfg.w},H=${cfg.h},FPS=${cfg.fps||60},DURATION=${cfg.dur||10},TOTAL_FRAMES=${totalF};
    const canvas=arguments[0], ctx=arguments[1], images=arguments[2];
    const THREE=arguments[3], scene3D=arguments[4], camera3D=arguments[5], renderer3D=arguments[6];
    const maplibre=null, mapGL=null;
    const gifGetFrame=()=>null;
    const gsap=arguments[10];
    const TimelineMax=gsap?gsap.timeline.bind(gsap):null;
    const TweenMax=gsap;
    const _ofoqRegisterTL=arguments[11]||(x=>x);
    ${EASING_SRC}
    ${code}
    if(typeof drawScene!=='function') throw new Error('الدالة drawScene غير موجودة في كود المشهد!');
    return drawScene;`;

  let drawFn;
  try {
    drawFn = (new Function(src))(
      canvas, ctx, preloadedImages,
      (typeof THREE !== 'undefined' ? THREE : null),
      scene3D, camera3D, renderer3D,
      null, null, null,
      gsapInst,
      _ofoqRegisterTL
    );
    console.log('✓ Scene compiled successfully');
  } catch(e) {
    window.__ERROR__ = 'خطأ في تجميع كود المشهد: ' + e.message;
    window.__READY__ = 'error';
    console.error('Scene compile error:', e);
    return;
  }

  // ── دالة رسم الإطار المكشوفة لـ Puppeteer ───────────────────────────────
  window.renderFrame = function(frameIndex) {
    try {
      // مسح الخلفية
      ctx.fillStyle = bg || '#000000';
      ctx.fillRect(0, 0, cfg.w, cfg.h);
      // استدعاء دالة المشهد
      drawFn(frameIndex);
      // إذا كان Three.js مستخدماً، ارسم على الـ canvas 2D
      if (renderer3D && scene3D && camera3D) {
        renderer3D.render(scene3D, camera3D);
        ctx.drawImage(renderer3D.domElement, 0, 0, cfg.w, cfg.h);
      }
      return canvas.toDataURL('image/png');
    } catch(e) {
      console.error(`Frame ${frameIndex} error:`, e.message);
      throw e;
    }
  };

  window.getTotalFrames = function() { return totalF; };
  window.__READY__ = 'ok';
  console.log(`✓ Renderer ready: ${cfg.w}x${cfg.h} @ ${cfg.fps}fps, ${totalF} frames`);
}

// ── تشغيل عند تحميل الصفحة ──────────────────────────────────────────────
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initScene);
} else {
  initScene();
}
</script>
</body>
</html>
