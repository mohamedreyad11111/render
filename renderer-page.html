<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Ofoq Studio — Server Renderer Page</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; }
</style>

<!-- ══ Polyfills — أول شيء يُحمَّل قبل أي كود ══════════════════════════════ -->
<script>
// ── roundRect polyfill (Chrome القديم في Puppeteer) ────────────────────────
(function() {
  function _roundRect(x, y, w, h, r) {
    if (w < 0) { x += w; w = -w; }
    if (h < 0) { y += h; h = -h; }
    var tl, tr, br, bl;
    if (!r) { tl = tr = br = bl = 0; }
    else if (typeof r === 'number') {
      r = Math.min(r, w / 2, h / 2);
      tl = tr = br = bl = r;
    } else if (Array.isArray(r)) {
      var a = r.map(function(v){ return Math.min(+v || 0, w/2, h/2); });
      if (a.length === 1) { tl = tr = br = bl = a[0]; }
      else if (a.length === 2) { tl = br = a[0]; tr = bl = a[1]; }
      else if (a.length === 3) { tl = a[0]; tr = bl = a[1]; br = a[2]; }
      else { tl = a[0]; tr = a[1]; br = a[2]; bl = a[3]; }
    } else { tl = tr = br = bl = 0; }
    this.beginPath();
    this.moveTo(x + tl, y);
    this.lineTo(x + w - tr, y);
    this.arcTo(x + w, y,     x + w, y + tr,     tr);
    this.lineTo(x + w, y + h - br);
    this.arcTo(x + w, y + h, x + w - br, y + h, br);
    this.lineTo(x + bl, y + h);
    this.arcTo(x,     y + h, x,     y + h - bl, bl);
    this.lineTo(x, y + tl);
    this.arcTo(x,     y,     x + tl, y,          tl);
    this.closePath();
    return this;
  }
  var protos = [
    typeof CanvasRenderingContext2D !== 'undefined'         && CanvasRenderingContext2D.prototype,
    typeof OffscreenCanvasRenderingContext2D !== 'undefined' && OffscreenCanvasRenderingContext2D.prototype,
    typeof Path2D !== 'undefined'                            && Path2D.prototype
  ];
  protos.forEach(function(p){ if (p && !p.roundRect) p.roundRect = _roundRect; });
})();

// ── structuredClone polyfill ────────────────────────────────────────────────
if (typeof structuredClone === 'undefined') {
  window.structuredClone = function(o) { return JSON.parse(JSON.stringify(o)); };
}

// ── requestAnimationFrame stub (headless) ──────────────────────────────────
if (typeof requestAnimationFrame === 'undefined') {
  window.requestAnimationFrame = function(cb) { return setTimeout(cb, 16); };
  window.cancelAnimationFrame  = clearTimeout;
}
</script>

<script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
</head>
<body>
<canvas id="c"></canvas>

<script>
const EASING_SRC = `
  function easeInOut(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
  function easeIn(t){return t*t*t;}
  function easeOut(t){return 1-(1-t)*(1-t)*(1-t);}
  function easeInQuad(t){return t*t;}
  function easeOutQuad(t){return 1-(1-t)*(1-t);}
  function easeInOutQuad(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
  function easeInCubic(t){return t*t*t;}
  function easeOutCubic(t){return 1-Math.pow(1-t,3);}
  function easeInOutCubic(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
  function easeOutElastic(t){const c4=2*Math.PI/3;return t===0?0:t===1?1:Math.pow(2,-10*t)*Math.sin((t*10-0.75)*c4)+1;}
  function easeOutBounce(t){const n1=7.5625,d1=2.75;if(t<1/d1)return n1*t*t;if(t<2/d1)return n1*(t-=1.5/d1)*t+.75;if(t<2.5/d1)return n1*(t-=2.25/d1)*t+.9375;return n1*(t-=2.625/d1)*t+.984375;}
  function lerp(a,b,t){return a+(b-a)*t;}
  function clamp(v,mn,mx){return Math.min(Math.max(v,mn),mx);}
  function map(v,a,b,c,d){return c+(d-c)*(v-a)/(b-a);}
  (function(){function _rr(x,y,w,h,r){var tl,tr,br,bl;if(!r){tl=tr=br=bl=0;}else if(typeof r==='number'){r=Math.min(r,w/2,h/2);tl=tr=br=bl=r;}else{var a=r.map(function(v){return Math.min(+v||0,w/2,h/2);});tl=a[0]||0;tr=a[1]||0;br=a[2]||0;bl=a[3]||0;}this.beginPath();this.moveTo(x+tl,y);this.lineTo(x+w-tr,y);this.arcTo(x+w,y,x+w,y+tr,tr);this.lineTo(x+w,y+h-br);this.arcTo(x+w,y+h,x+w-br,y+h,br);this.lineTo(x+bl,y+h);this.arcTo(x,y+h,x,y+h-bl,bl);this.lineTo(x,y+tl);this.arcTo(x,y,x+tl,y,tl);this.closePath();return this;}if(typeof CanvasRenderingContext2D!=='undefined'&&!CanvasRenderingContext2D.prototype.roundRect)CanvasRenderingContext2D.prototype.roundRect=_rr;})();
`;

async function initScene() {
  const D = window.__SCENE_DATA__;
  if (!D) { window.__ERROR__ = 'لا توجد بيانات مشهد'; window.__READY__ = 'error'; return; }

  const { code, cfg, fonts, images, bg } = D;
  const canvas = document.getElementById('c');
  canvas.width = cfg.w || 1920; canvas.height = cfg.h || 1080;
  document.body.style.background = bg || '#000';
  const ctx = canvas.getContext('2d', { alpha: false });

  for (const fe of (Array.isArray(fonts) ? fonts : [])) {
    try {
      const url  = typeof fe === 'string' ? fe : fe.url;
      const name = typeof fe === 'string'
        ? fe.split('/').pop().replace(/\.[^.]+$/, '').replace(/[-_+]/g, ' ')
        : (fe.name || 'CustomFont');
      const face = new FontFace(name, 'url(' + url + ')');
      await face.load(); document.fonts.add(face);
      console.log('✓ Font:', name);
    } catch(e) { console.warn('⚠ Font failed:', e.message); }
  }

  const preloadedImages = {};
  for (const [k, url] of Object.entries(images || {})) {
    await new Promise(r => {
      const img = new Image(); img.crossOrigin = 'anonymous';
      img.onload = () => { preloadedImages[k] = img; r(); };
      img.onerror = () => { console.warn('⚠ Img failed:', k); r(); };
      img.src = url;
    });
  }

  let scene3D = null, camera3D = null, renderer3D = null;
  try {
    renderer3D = new THREE.WebGLRenderer({ alpha:true, antialias:true, preserveDrawingBuffer:true });
    renderer3D.setSize(cfg.w, cfg.h); renderer3D.setClearColor(0x000000, 0);
    scene3D = new THREE.Scene();
    camera3D = new THREE.PerspectiveCamera(45, cfg.w/cfg.h, 0.1, 1000);
  } catch(e) { console.warn('⚠ No GPU:', e.message); }

  const totalF = Math.round((cfg.dur||10) * (cfg.fps||60));

  const src = '"use strict";' +
    'const W='+cfg.w+',H='+cfg.h+',FPS='+(cfg.fps||60)+',DURATION='+(cfg.dur||10)+',TOTAL_FRAMES='+totalF+';' +
    'const canvas=arguments[0],ctx=arguments[1],images=arguments[2];' +
    'const THREE=arguments[3],scene3D=arguments[4],camera3D=arguments[5],renderer3D=arguments[6];' +
    'const maplibre=null,mapGL=null,gifGetFrame=function(){return null;};' +
    'const gsap=arguments[10];' +
    'const TimelineMax=gsap?gsap.timeline.bind(gsap):null;' +
    'const TweenMax=gsap;' +
    'const _ofoqRegisterTL=arguments[11]||(function(x){return x;});' +
    EASING_SRC +
    code +
    '\nif(typeof drawScene!=="function") throw new Error("drawScene غير موجودة!");' +
    '\nreturn drawScene;';

  let drawFn;
  try {
    drawFn = (new Function(src))(
      canvas, ctx, preloadedImages,
      (typeof THREE !== 'undefined' ? THREE : null),
      scene3D, camera3D, renderer3D,
      null, null, null,
      window.gsap || null,
      function(tl){ return tl; }
    );
    console.log('✓ Scene compiled');
  } catch(e) {
    window.__ERROR__ = 'خطأ في الكود: ' + e.message;
    window.__READY__ = 'error';
    console.error('Compile error:', e.message);
    return;
  }

  window.renderFrame = function(fi) {
    ctx.fillStyle = bg || '#000000';
    ctx.fillRect(0, 0, cfg.w, cfg.h);
    drawFn(fi);
    if (renderer3D && scene3D && camera3D) {
      renderer3D.render(scene3D, camera3D);
      ctx.drawImage(renderer3D.domElement, 0, 0, cfg.w, cfg.h);
    }
    return canvas.toDataURL('image/png');
  };

  window.getTotalFrames = function() { return totalF; };
  window.__READY__ = 'ok';
  console.log('✓ Ready: '+cfg.w+'x'+cfg.h+' @ '+(cfg.fps||60)+'fps — '+totalF+' frames');
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initScene);
} else { initScene(); }
</script>
</body>
 </html>
